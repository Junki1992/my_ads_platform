services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: my_ads_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # backend と celery は同一イメージを共有（片方だけ再ビルドでズレて ModuleNotFound になるのを防ぐ）
  backend:
    build: ./backend
    image: my_ads_platform-backend:latest
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - DEBUG=True
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env

  frontend:
    build: ./frontend
    command: npm start
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      # フロントコンテナ内では 127.0.0.1:8000 はバックエンドではない（src/setupProxy.js）
      - BACKEND_PROXY=http://backend:8000
    depends_on:
      - backend

  celery:
    image: my_ads_platform-backend:latest
    command: celery -A config worker --loglevel=info
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    environment:
      - DEBUG=True
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env

volumes:
  postgres_data: