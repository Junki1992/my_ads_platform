# ==============================================================================
# Nginx 本番環境設定
# ==============================================================================
# backend コンテナ再作成で Docker 内 IP が変わると、従来の upstream 名解決は
# 起動時1回のまま古い IP を掴み 502 になる。127.0.0.11 + 変数で都度解決する。
# https://docs.docker.com/config/containers/container-networking/#dns-services
resolver 127.0.0.11 valid=10s ipv6=off;

# HTTPからHTTPSへのリダイレクト
server {
    listen 80;
    server_name lots-of-love.top www.lots-of-love.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name lots-of-love.top www.lots-of-love.top;
    
    # SSL証明書
    ssl_certificate /etc/letsencrypt/live/lots-of-love.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lots-of-love.top/privkey.pem;
    
    # SSL設定
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    client_max_body_size 100M;
    
    # バックエンドAPI
    location /api/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # タイムアウト設定
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
    
    # Django管理画面
    location /admin/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Django静的ファイル
    location /django-static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # メディアファイル
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public";
    }
    
    # フロントエンド（React）- 最後に配置して、他のルートに該当しない場合はこちらへ
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        
        # キャッシュ設定
        expires 1d;
        add_header Cache-Control "public, immutable";
    }
    
    # ヘルスチェック
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
    
    # gzip圧縮
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
}

