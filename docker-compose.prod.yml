services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_NAME:-my_ads_platform}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ports:  # 本番環境では外部公開不要（内部通信のみ）
    #   - "5432:5432"
    restart: always
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    # ports:  # 本番環境では外部公開不要（内部通信のみ）
    #   - "6379:6379"
    restart: always
    networks:
      - app-network
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 300
    volumes:
      - ./backend:/app
      - static_volume:/app/static
      - media_volume:/app/media
    # ports:  # Nginxがプロキシするので外部公開不要
    #   - "8000:8000"
    expose:
      - "8000"  # コンテナ間通信用
    depends_on:
      - db
      - redis
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DB_HOST=db
      # compose 内の Postgres は SSL 非対応。.env の DB_SSLMODE=require よりこちらを優先する
      - DB_SSLMODE=disable
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    restart: always
    networks:
      - app-network

  # frontend:  # ローカルビルド済みなのでコンテナ不要
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile.prod
  #   volumes:
  #     - frontend_build:/app/build
  #   restart: always
  #   networks:
  #     - app-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_volume:/app/static:ro
      - media_volume:/app/media:ro
      - ./frontend/build:/usr/share/nginx/html:ro  # ローカルビルド済みを直接マウント
      - /etc/letsencrypt:/etc/letsencrypt:ro  # SSL証明書
    depends_on:
      - backend
    restart: always
    networks:
      - app-network

  celery:
    build: ./backend
    command: celery -A config worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DB_HOST=db
      - DB_SSLMODE=disable
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    restart: always
    networks:
      - app-network

  celery-beat:
    build: ./backend
    command: celery -A config beat --loglevel=info
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DB_HOST=db
      - DB_SSLMODE=disable
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    restart: always
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  # frontend_build:  # ローカルビルド済みを直接使うので不要

networks:
  app-network:
    driver: bridge

